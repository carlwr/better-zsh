name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm config set store-dir /tmp/pnpm-store
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - name: Install ripgrep (required by test:smoke — orient skill scripts)
        run: |
          # test:smoke runs skills/orient/scripts/{exports,providers}.sh which use rg.
          # Must be installed BEFORE test:smoke, not bundled with the later "Linux test
          # deps" step (which comes after). Ripgrep ships as a static binary — no concern
          # about grep dialect differences between BSD/GNU across environments.
          s=; command -v sudo >/dev/null 2>&1 && s=sudo
          $s apt-get -o Acquire::Retries=3 update
          $s apt-get -o Acquire::Retries=3 install -y --no-install-recommends ripgrep
      - run: pnpm test:smoke
      - name: Install Linux test deps
        run: |
          s=
          if command -v sudo >/dev/null 2>&1; then
            s=sudo
          fi
          # Retries help transient mirror/network failures; --no-install-recommends
          # keeps the integration image smaller without hiding warnings/errors.
          $s apt-get -o Acquire::Retries=3 update
          $s apt-get -o Acquire::Retries=3 install -y --no-install-recommends \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatspi2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libsecret-1-0 \
            libxss1 \
            libxtst6 \
            unzip \
            xvfb \
            zsh
      - run: xvfb-run -a pnpm testINTERACTIVE:electron
      - run: xvfb-run -a pnpm testINTERACTIVE:electron-bundled
