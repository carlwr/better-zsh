name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  # Dedicated job for @carlwr/zshref-mcp — intentionally mirrors what a
  # standalone CI would run in the package's own repo (after extraction).
  # The monorepo-internal `integration` job re-covers unit tests via
  # `pnpm test`; the `mcp` job isolates failures of the MCP-specific
  # packaging/install/JSR surface.
  #
  # Release workflows for @carlwr/zsh-core-tooldef and @carlwr/zshref
  # are TODO — today only zsh-core, the extension, and zshref-mcp have
  # dedicated release pipelines under `.github/workflows/release-*.yml`.
  mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm config set store-dir /tmp/pnpm-store
      - run: pnpm install --frozen-lockfile
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: pnpm --filter @carlwr/zshref-mcp run check
      - run: pnpm --filter @carlwr/zshref-mcp run test
      - run: pnpm --filter @carlwr/zshref-mcp run test:smoke
      - run: pnpm --filter @carlwr/zshref-mcp run test:install
      - run: pnpm --filter @carlwr/zshref-mcp run jsr:check

  # Dedicated job for @carlwr/zsh-core-tooldef — shared tool layer
  # consumed by the MCP server, the CLI, and the extension. Unlike
  # mcp/zshref this is shared infrastructure (no standalone-extraction
  # target today), so no `test:install` step: the package has no bin.
  tooldef:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm config set store-dir /tmp/pnpm-store
      - run: pnpm install --frozen-lockfile
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: pnpm --filter @carlwr/zsh-core-tooldef run check
      - run: pnpm --filter @carlwr/zsh-core-tooldef run test
      - run: pnpm --filter @carlwr/zsh-core-tooldef run test:smoke
      - run: pnpm --filter @carlwr/zsh-core-tooldef run jsr:check

  # Dedicated job for @carlwr/zshref — CLI adapter over tooldef.
  # Mirrors the `mcp` job: same packaging/install/JSR surface as would
  # apply in a standalone repo after extraction. Requires the workspace
  # root `.npmrc` for `@jsr:registry=https://npm.jsr.io` (cliffy).
  zshref:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm config set store-dir /tmp/pnpm-store
      - run: pnpm install --frozen-lockfile
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: pnpm --filter @carlwr/zshref run check
      - run: pnpm --filter @carlwr/zshref run test
      - run: pnpm --filter @carlwr/zshref run test:smoke
      - run: pnpm --filter @carlwr/zshref run test:install
      - run: pnpm --filter @carlwr/zshref run jsr:check

  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Sequential bootstrap of upstream packages + BZ_SKIP_UPSTREAM=1 for
    # aggregator steps. Without this, workspace-recursive runs race on
    # shared `dist/` of upstream packages — each package's prebuild hook
    # tries to `clean: true`-rebuild zsh-core / tooldef, clobbering a
    # sibling's in-progress build and producing "no declaration file"
    # errors mid-typecheck. See `AGENTS.md` §`BZ_SKIP_UPSTREAM`.
    env:
      BZ_SKIP_UPSTREAM: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm config set store-dir /tmp/pnpm-store
      - run: pnpm install --frozen-lockfile
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Sequential bootstrap build of upstream packages
        run: |
          pnpm --filter @carlwr/zsh-core build
          pnpm --filter @carlwr/zsh-core-tooldef build
          pnpm --filter @carlwr/zshref-mcp build
          pnpm --filter @carlwr/zshref build
      - run: pnpm check
      - run: pnpm test
      - name: Install ripgrep (required by test:smoke — orient skill scripts)
        run: |
          # test:smoke runs skills/orient/scripts/{exports,providers}.sh which use rg.
          # Must be installed BEFORE test:smoke, not bundled with the later "Linux test
          # deps" step (which comes after). Ripgrep ships as a static binary — no concern
          # about grep dialect differences between BSD/GNU across environments.
          s=; command -v sudo >/dev/null 2>&1 && s=sudo
          $s apt-get -o Acquire::Retries=3 update
          $s apt-get -o Acquire::Retries=3 install -y --no-install-recommends ripgrep
      - run: pnpm test:smoke
      - run: pnpm --filter @carlwr/zsh-core test:install
      - run: pnpm --filter @carlwr/zsh-core run jsr:check
      - name: Install Linux test deps
        run: |
          s=
          if command -v sudo >/dev/null 2>&1; then
            s=sudo
          fi
          # Retries help transient mirror/network failures; --no-install-recommends
          # keeps the integration image smaller without hiding warnings/errors.
          $s apt-get -o Acquire::Retries=3 update
          $s apt-get -o Acquire::Retries=3 install -y --no-install-recommends \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatspi2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libsecret-1-0 \
            libxss1 \
            libxtst6 \
            unzip \
            xvfb \
            zsh
      - run: xvfb-run -a pnpm testINTERACTIVE:electron
      # zsh-path-matrix: container-only (VS Code's shell env resolution
      # defeats PATH isolation on macOS). No npm script — CI-exclusive.
      - run: xvfb-run -a pnpm --filter better-zsh exec -- bash -c 'pnpm build && tsc -p tsconfig.vscode-test.json && scripts/testINTERACTIVE-zsh-path-matrix'
      - run: xvfb-run -a pnpm testINTERACTIVE:electron-bundled
