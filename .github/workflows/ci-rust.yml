# Rust CI for the `zshref-rs/` crate.
#
# Scope: format check, clippy, test. Artifact publishing (a binary
# release) is out of scope here — add a separate release-zshref-rs.yml
# when a cargo publish / GH-release cadence is decided.
# Validated on GitHub-hosted workers (ubuntu-latest, ~1m30s typical).

name: CI — zshref-rs

on:
  pull_request:
    paths:
      - "zshref-rs/**"
      - "packages/zsh-core/**"
      - "packages/zsh-core-tooldef/**"
      - "Makefile"
      - ".github/workflows/ci-rust.yml"
  push:
    paths:
      - "zshref-rs/**"
      - "packages/zsh-core/**"
      - "packages/zsh-core-tooldef/**"
      - "Makefile"
      - ".github/workflows/ci-rust.yml"
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # TS artifacts first: the Rust crate `include_bytes!`-embeds
      # dist/json/*.json from packages/zsh-core and zsh-core-tooldef.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm config set store-dir /tmp/pnpm-store
      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache cargo registry + target/ to keep iterations fast. Keyed
      # on Cargo.lock so dep upgrades invalidate cleanly.
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            zshref-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('zshref-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Hygiene (fmt + clippy)
        run: make cli-check

      - name: Tests (fixture parity + drift-guards + fuzz)
        run: make cli-test

      # Vendored-mode smoke: proves the published `.crate` is self-contained.
      # `cargo package` builds the tarball with the same include rules as
      # `cargo publish` and verifies it compiles standalone. See DATA-SYNC.md.
      - name: Vendored-mode test + package dry-run
        run: |
          make cli-vendored-test
          make cli-package
