# Pre-release scaffold. Does not install anything real yet.
#
# CAVEAT: `brew audit --strict --online` will FAIL during pre-release because
# the formula's `url` + `sha256` are placeholders (no real release tarball).
# That step is therefore set to `continue-on-error: true` so the workflow
# stays green until a real release exists.
#
# Once the release tarball is published and the formula's url/sha256 are
# updated, remove `continue-on-error: true` from the brew-audit step.
#
# `brew style` does NOT require URL resolution and will catch Ruby lint
# issues even pre-release; it is always required to pass (no continue-on-error).
#
# NOTE: this workflow is written to live at the repo root of the *extracted*
# homebrew-zshref repo. When it lives inside the monorepo, the path triggers
# below will not match anything (they reference Formula/** relative to repo
# root). The workflow is ready to use as-is after extraction.

name: Brew audit

on:
  push:
    paths:
      - "Formula/**"
      - ".github/workflows/brew-audit.yml"
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/brew-audit.yml"
  workflow_dispatch:

jobs:
  audit:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Style check (Formula/zshref.rb)
        # `brew style` is a Ruby/RuboCop lint — works without URL resolution.
        # Must pass even pre-release.
        run: brew style Formula/zshref.rb

      - name: Audit (Formula/zshref.rb)
        # `brew audit --strict --online` verifies URL reachability, sha256,
        # and Homebrew policy. Will fail until a real release tarball exists.
        # continue-on-error: remove once url + sha256 are updated in the formula.
        continue-on-error: true
        run: brew audit --strict --online Formula/zshref.rb
